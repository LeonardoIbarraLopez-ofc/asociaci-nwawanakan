<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Los principios que guían el trabajo diario de la Asociación Wawanakan Kusisinapa: equidad, solidaridad, respeto, trabajo en equipo y honestidad.">

  <meta property="og:site_name" content="Asociación Wawanakan Kusisinapa">
  <meta property="og:title" content="Valores | Asociación Wawanakan Kusisinapa">
  <meta property="og:description" content="Los principios que guían el trabajo diario de la Asociación Wawanakan Kusisinapa: equidad, solidaridad, respeto, trabajo en equipo y honestidad.">
  <meta property="og:image" content="https://asociacionwawanakan-eng.github.io/asociaci-nwawanakan/assets/institucional/logotipo.png">
  <meta property="og:url" content="https://asociacionwawanakan-eng.github.io/asociaci-nwawanakan/valores.html">
  <link rel="icon" href="assets/institucional/logotipo.png" type="image/png">
  <link rel="canonical" href="https://asociacionwawanakan-eng.github.io/asociaci-nwawanakan/valores.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="page-main">
    <section class="page-hero">
      <p class="eyebrow">Valores</p>
      <h1>Principios que guían nuestro servicio</h1>
    </section>
    <section class="section section-cream">
      <h2 class="sr-only">Nuestros valores</h2>
      <div class="values-grid" id="valores-grid-page"></div>
    </section>
  </main>

  <footer class="site-footer" aria-label="Pie de pagina institucional"></footer>

  <script src="js/diagnostics.js"></script>
  <script src="js/components.js"></script>
  <script>WawaComponents.renderHeader("valores.html"); WawaComponents.renderFooter();</script>
  <script src="js/main.js"></script>
  <script type="module" src="js/firebase-content.js"></script>
  <script>
    (function () {
      var esc = function(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); };
      function renderValoresPage(valores) {
        var grid = document.getElementById("valores-grid-page");
        if (!grid || !Array.isArray(valores) || !valores.length) return;
        grid.innerHTML = valores.map(function(v) {
          return '<article><span></span><h3>' + esc(v.titulo) + '</h3></article>';
        }).join("");
      }
      document.addEventListener("wawa:content-ready", function(e) { renderValoresPage(e.detail && e.detail.valores); });
      document.addEventListener("wawa:content-updated", function(e) { renderValoresPage(e.detail && e.detail.valores); });
    })();
  </script>
</body>
</html>
